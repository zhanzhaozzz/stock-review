version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sr-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: sr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: sr-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  app-data:
  app-logs:
  redis-data:
  frontend-dist:
